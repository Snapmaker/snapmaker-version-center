name: Cloudflare Pages PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'config/**'
      - 'upgrade/**'

concurrency:
  group: cloudflare-pages-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'snapmaker-version-center' }} --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const prNumber = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cloudflare Pages Preview')
            );

            const body = [
              '## :rocket: Cloudflare Pages Preview',
              '',
              `**Status:** :white_check_mark: Deployed`,
              '',
              `**Preview URL:** ${previewUrl}`,
              '',
              '**Quick Links:**',
              `- [/config/domain.json](${previewUrl}/config/domain.json)`,
              `- [/upgrade/flutter/en/version.json](${previewUrl}/upgrade/flutter/en/version.json)`,
              '',
              `<sub>Updated: ${new Date().toISOString()}</sub>`
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  cleanup-deployment:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Install wrangler
        run: npm install -g wrangler

      - name: Check and delete deployment if exists
        id: cleanup
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT_NAME="${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'snapmaker-version-center' }}"
          BRANCH="pr-${{ github.event.pull_request.number }}"

          echo "Checking for deployment on branch: $BRANCH"

          # List deployments and check if our branch exists
          if wrangler pages deployment list --project-name="$PROJECT_NAME" 2>/dev/null | grep -q "$BRANCH"; then
            echo "Found deployment for branch $BRANCH, deleting..."
            wrangler pages deployment delete --project-name="$PROJECT_NAME" --branch="$BRANCH" --yes
            echo "deleted=true" >> $GITHUB_OUTPUT
          else
            echo "No deployment found for branch $BRANCH, skipping deletion."
            echo "deleted=false" >> $GITHUB_OUTPUT
          fi

      - name: Update PR comment
        if: steps.cleanup.outputs.deleted == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cloudflare Pages Preview')
            );

            if (botComment) {
              const body = [
                '## :rocket: Cloudflare Pages Preview',
                '',
                '**Status:** :x: Deleted',
                '',
                'Preview deployment has been cleaned up.',
                '',
                `<sub>Cleaned: ${new Date().toISOString()}</sub>`
              ].join('\n');

              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            }
