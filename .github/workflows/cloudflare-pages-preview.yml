name: Cloudflare Pages PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'config/**'
      - 'upgrade/**'

concurrency:
  group: cloudflare-pages-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'snapmaker-version-center' }} --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const prNumber = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cloudflare Pages Preview')
            );

            const body = [
              '## :rocket: Cloudflare Pages Preview',
              '',
              `**Status:** :white_check_mark: Deployed`,
              '',
              `**Preview URL:** ${previewUrl}`,
              '',
              '**Quick Links:**',
              `- [/config/domain.json](${previewUrl}/config/domain.json)`,
              `- [/upgrade/flutter/en/version.json](${previewUrl}/upgrade/flutter/en/version.json)`,
              '',
              `<sub>Updated: ${new Date().toISOString()}</sub>`
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  cleanup-deployment:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete deployment
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deployment delete --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'snapmaker-version-center' }} --branch=pr-${{ github.event.pull_request.number }} --yes
        continue-on-error: true

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cloudflare Pages Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: `## :rocket: Cloudflare Pages Preview\n\n| Status | Info |\n|--------|------|\n| :x: Deleted | Preview deployment cleaned up |\n\n<sub>Cleaned: ${new Date().toISOString()}</sub>`
              });
            }
